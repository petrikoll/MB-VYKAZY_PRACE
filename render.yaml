services:
  - type: web
    name: vykazy-moravsky-beroun
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: APP_DB_PATH
        value: /var/data/app-db.json
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: vykazy-data
      mountPath: /var/data
      sizeGB: 1
